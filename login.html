<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Campus Marketplace</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
          <div class="text-center mb-4">
            <a class="navbar-brand fw-bold text-primary fs-3" href="index.html"
              >CampusMart</a
            >
          </div>
          <div class="card form-card shadow-sm border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
              <h4 class="fw-bold mb-4 text-center">Welcome back</h4>

              <form id="login-form">
                <div class="mb-3">
                  <label class="form-label fw-medium">College Email</label>
                  <input
                    type="email"
                    class="form-control"
                    placeholder="student@college.edu"
                    required
                  />
                </div>
                <div class="mb-4">
                  <label class="form-label fw-medium">Password</label>
                  <input
                    type="password"
                    class="form-control"
                    placeholder="••••••••"
                    required
                  />
                </div>
                <button
                  type="submit"
                  class="btn btn-primary w-100 py-2 rounded-pill fw-medium"
                >
                  Sign In
                </button>
              </form>

              <div class="text-center mt-4 text-muted small">
                Don't have an account?
                <a href="#" class="text-primary text-decoration-none"
                  >Sign up</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
