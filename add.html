<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Product | Campus Marketplace</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-light">
    <nav
      class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm"
    >
      <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="index.html">
          <i class="fa-solid fa-graduation-cap me-2"></i>CampusMart
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="add.html">Add Product</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="card form-card shadow-sm border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <h2 class="fw-bold">List an Item</h2>
                <p class="text-muted">
                  Fill out the details to post your product.
                </p>
              </div>

              <form id="add-product-form">
                <div class="mb-3">
                  <label for="title" class="form-label fw-medium"
                    >Product Title</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="title"
                    placeholder="e.g. Casio fx-991EX Calculator"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="price" class="form-label fw-medium"
                    >Price (₹)</label
                  >
                  <div class="input-group">
                    <span class="input-group-text bg-white text-muted">₹</span>
                    <input
                      type="number"
                      class="form-control"
                      id="price"
                      placeholder="850"
                      min="0"
                      step="0.01"
                      required
                    />
                  </div>
                </div>

                <div class="mb-3">
                  <label for="image" class="form-label fw-medium"
                    >Upload Image</label
                  >
                  <input
                    type="file"
                    class="form-control"
                    id="image"
                    accept="image/*"
                    required
                  />
                </div>

                <div class="mb-4">
                  <label for="description" class="form-label fw-medium"
                    >Description</label
                  >
                  <textarea
                    class="form-control"
                    id="description"
                    rows="4"
                    placeholder="Describe the condition, age, and any accessories included..."
                    required
                  ></textarea>
                </div>

                <button
                  type="submit"
                  class="btn btn-primary w-100 py-2 rounded-pill fw-medium"
                >
                  Post Listing
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
